name: Platform wheels

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  linux:
    name: ${{ matrix.platform-tag }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            container: quay.io/pypa/manylinux_2_28_x86_64
            platform-tag: manylinux_2_28_x86_64
          - runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            platform-tag: manylinux_2_28_aarch64
    env:
      PYTHON: /opt/python/cp310-cp310/bin/python
      PY_PDFTOOLS_WHEEL_PLATFORM_TAG: ${{ matrix.platform-tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: "25"
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Python build tools
        run: >-
          $PYTHON -m pip install "hatchling>=1.31,<2" build
          "pypdf>=6,<7"
          "tomli>=1.2.2; python_version < '3.11'"
      - name: Run JVM tests
        run: ./gradlew :java:test
      - name: Build wheel
        run: $PYTHON -m build --wheel --no-isolation
      - name: Run native and Python tests
        env:
          PYTHONPATH: src
          PY_PDFTOOLS_NATIVE_LIBRARY: java/build/native/libpy_pdftools.so
        run: |
          ./gradlew :java:nativeSmoke
          $PYTHON -m unittest discover -v
      - name: Inspect and install wheel
        run: |
          auditwheel show dist/*.whl
          $PYTHON -m venv wheel-venv
          wheel-venv/bin/python -m pip install --no-deps dist/*.whl
      - name: Run installed wheel without build tools
        run: |
          unset PYTHONPATH PY_PDFTOOLS_NATIVE_LIBRARY GRAALVM_HOME JAVA_HOME
          PATH=/usr/bin:/bin wheel-venv/bin/python tools/installed_wheel_smoke.py
      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.platform-tag }}
          path: dist/*.whl
          if-no-files-found: error

  macos:
    name: ${{ matrix.platform-tag }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform-tag: macosx_11_0_arm64
          - runner: macos-15-intel
            platform-tag: macosx_10_15_x86_64
    env:
      PY_PDFTOOLS_WHEEL_PLATFORM_TAG: ${{ matrix.platform-tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: "25"
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: gradle
      - name: Install Python build tools
        run: >-
          python -m pip install "hatchling>=1.31,<2" build
          "pypdf>=6,<7"
          "tomli>=1.2.2; python_version < '3.11'"
      - name: Run JVM tests
        run: ./gradlew :java:test
      - name: Build wheel
        run: python -m build --wheel --no-isolation
      - name: Run native and Python tests
        env:
          PYTHONPATH: src
          PY_PDFTOOLS_NATIVE_LIBRARY: java/build/native/libpy_pdftools.dylib
        run: |
          ./gradlew :java:nativeSmoke
          python -m unittest discover -v
      - name: Install wheel
        run: |
          python -m venv wheel-venv
          wheel-venv/bin/python -m pip install --no-deps dist/*.whl
      - name: Run installed wheel without build tools
        run: |
          unset PYTHONPATH PY_PDFTOOLS_NATIVE_LIBRARY GRAALVM_HOME JAVA_HOME
          PATH=/usr/bin:/bin wheel-venv/bin/python tools/installed_wheel_smoke.py
      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.platform-tag }}
          path: dist/*.whl
          if-no-files-found: error

  windows:
    name: win_amd64
    runs-on: windows-2025
    env:
      PY_PDFTOOLS_WHEEL_PLATFORM_TAG: win_amd64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: "25"
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Python build tools
        run: >-
          python -m pip install "hatchling>=1.31,<2" build
          "pypdf>=6,<7"
          "tomli>=1.2.2; python_version < '3.11'"
      - name: Run JVM tests
        run: .\gradlew.bat :java:test
      - name: Build wheel
        run: python -m build --wheel --no-isolation
      - name: Run Python tests against native library
        shell: pwsh
        run: |
          $env:PYTHONPATH = "src"
          $env:PY_PDFTOOLS_NATIVE_LIBRARY = `
            (Resolve-Path "java/build/native/py_pdftools.dll").Path
          python -m unittest discover -v
      - name: Install wheel
        shell: pwsh
        run: |
          python -m venv wheel-venv
          $wheel = (Get-ChildItem "dist/*.whl").FullName
          wheel-venv/Scripts/python.exe -m pip install --no-deps $wheel
      - name: Run installed wheel without build tools
        shell: pwsh
        run: |
          $python = (Resolve-Path "wheel-venv/Scripts/python.exe").Path
          Remove-Item Env:PYTHONPATH -ErrorAction SilentlyContinue
          Remove-Item Env:PY_PDFTOOLS_NATIVE_LIBRARY -ErrorAction SilentlyContinue
          Remove-Item Env:GRAALVM_HOME -ErrorAction SilentlyContinue
          Remove-Item Env:JAVA_HOME -ErrorAction SilentlyContinue
          $env:PATH = "$env:SystemRoot\System32;$env:SystemRoot"
          & $python tools/installed_wheel_smoke.py
      - uses: actions/upload-artifact@v7
        with:
          name: wheel-win_amd64
          path: dist/*.whl
          if-no-files-found: error
